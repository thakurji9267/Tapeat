<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Tapeat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family: Arial; background:#f5f5f5; text-align:center;}
input {padding:10px; margin:5px; width:80%;}
button {padding:10px; background:green; color:white; border:none;}
</style>
</head>

<body>

<h2>🔐 Admin Panel</h2>

<input type="text" id="name" placeholder="Product Name"><br>
<input type="number" id="price" placeholder="Price"><br>
<input type="text" id="img" placeholder="Image Link"><br>

<button onclick="addProduct()">Add Product</button>

<h3>Saved Products</h3>
<div id="list"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let img = document.getElementById("img").value;

products.push({name, price, img});
localStorage.setItem("products", JSON.stringify(products));

alert("Product Added!");
showProducts();
}

function showProducts(){
let html="";
products.forEach(p=>{
html += `<p>${p.name} - ₹${p.price}</p>`;
});
document.getElementById("list").innerHTML = html;
}

showProducts();
</script>

</body>
</html>
